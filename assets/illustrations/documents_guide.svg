<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="A villager holding documents stands next to an open guidebook labeled aavedan kaise karein; behind, a small government building labeled Chandauti Block.">

  <!-- Ground shadow -->
  <ellipse cx="140" cy="158" rx="116" ry="9" fill="#5A4632" opacity="0.10"/>

  <!-- ── Sun (top right) ────────────────────────────────────────────────── -->
  <circle cx="244" cy="30" r="11" fill="#F5C36B"/>
  <line x1="244" y1="14" x2="244" y2="9" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="253" y1="19" x2="258" y2="14" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="258" y1="30" x2="264" y2="30" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="253" y1="40" x2="258" y2="45" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="244" y1="45" x2="244" y2="51" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="235" y1="40" x2="230" y2="45" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="230" y1="30" x2="224" y2="30" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="235" y1="19" x2="230" y2="14" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>

  <!-- ── Small government building in background (right, labeled चंदौती ब्लॉक) ── -->
  <!-- Roof -->
  <polygon points="186,72 246,72 238,58 194,58" fill="#9C4E2E" stroke="#5C3920" stroke-width="1.2"/>
  <!-- Flag pole on top -->
  <line x1="216" y1="58" x2="216" y2="44" stroke="#5C3920" stroke-width="1.2"/>
  <polygon points="216,44 224,46 216,50" fill="#C2440A"/>
  <!-- Building body (govt cream) -->
  <rect x="190" y="72" width="52" height="34" fill="#F0E2BE" stroke="#5C3920" stroke-width="1.2"/>
  <!-- Two windows -->
  <rect x="196" y="78" width="8" height="8" fill="#9FE1CB" stroke="#5C3920" stroke-width="0.8"/>
  <rect x="228" y="78" width="8" height="8" fill="#9FE1CB" stroke="#5C3920" stroke-width="0.8"/>
  <!-- Door -->
  <rect x="210" y="86" width="12" height="20" fill="#5C3920"/>
  <!-- Name plate above door -->
  <rect x="196" y="89" width="40" height="9" fill="#FFFFFF" stroke="#5C3920" stroke-width="0.6"/>
  <text x="216" y="96" font-family="Noto Sans Devanagari, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#3D2817">चंदौती ब्लॉक</text>

  <!-- Arrow from left notebook over to the building (dotted, suggesting "where to go") -->
  <path d="M118 70 Q150 50 188 68" stroke="#1A8870" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="2 3"/>
  <!-- Arrowhead at building -->
  <path d="M183 66 L189 68 L185 72 Z" fill="#1A8870"/>

  <!-- ── Open guidebook (right of villager, two pages spread) ───────────── -->
  <!-- Right page: आवेदन कैसे करें -->
  <g transform="translate(112 84) rotate(-5)">
    <!-- Right page background -->
    <path d="M0 0 L46 0 L46 56 L0 56 Z" fill="#FFFFFF" stroke="#7A3F22" stroke-width="1.4"/>
    <!-- Top header -->
    <rect x="0" y="0" width="46" height="11" fill="#1A8870"/>
    <text x="23" y="8" font-family="Noto Sans Devanagari, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#FFFFFF">आवेदन कैसे करें</text>
    <!-- Step 1: numbered bullet + line -->
    <circle cx="5" cy="18" r="2.2" fill="#C2440A"/>
    <text x="5" y="20" font-family="Inter, sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="#FFFFFF">1</text>
    <line x1="10" y1="18" x2="42" y2="18" stroke="#9C8A6A" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="10" y1="21" x2="38" y2="21" stroke="#9C8A6A" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Step 2 -->
    <circle cx="5" cy="28" r="2.2" fill="#C2440A"/>
    <text x="5" y="30" font-family="Inter, sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="#FFFFFF">2</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#9C8A6A" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="10" y1="31" x2="36" y2="31" stroke="#9C8A6A" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Step 3 -->
    <circle cx="5" cy="38" r="2.2" fill="#C2440A"/>
    <text x="5" y="40" font-family="Inter, sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="#FFFFFF">3</text>
    <line x1="10" y1="38" x2="42" y2="38" stroke="#9C8A6A" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="10" y1="41" x2="34" y2="41" stroke="#9C8A6A" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Step 4 -->
    <circle cx="5" cy="48" r="2.2" fill="#C2440A"/>
    <text x="5" y="50" font-family="Inter, sans-serif" font-size="3.5" font-weight="bold" text-anchor="middle" fill="#FFFFFF">4</text>
    <line x1="10" y1="48" x2="40" y2="48" stroke="#9C8A6A" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="10" y1="51" x2="36" y2="51" stroke="#9C8A6A" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- ── Villager (left, holding documents proudly) ─────────────────────── -->
  <!-- Head -->
  <circle cx="54" cy="74" r="10" fill="#7A3F22"/>
  <path d="M44 74 Q54 64 64 74" fill="#5C3920" stroke="#7A3F22" stroke-width="1.2"/>
  <!-- Torso -->
  <line x1="54" y1="84" x2="54" y2="116" stroke="#7A3F22" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Arms holding documents in front -->
  <path d="M54 94 L42 102" stroke="#7A3F22" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M54 94 L66 102" stroke="#7A3F22" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Documents stack in hand (3 stacked, slightly fanned) -->
  <g transform="translate(54 106)">
    <!-- Bottom doc -->
    <rect x="-16" y="-2" width="32" height="22" rx="1.5" fill="#FFFFFF" stroke="#7A3F22" stroke-width="1.2" transform="rotate(-4)"/>
    <!-- Middle doc -->
    <rect x="-14" y="-4" width="32" height="22" rx="1.5" fill="#FCEFD2" stroke="#7A3F22" stroke-width="1.2" transform="rotate(2)"/>
    <!-- Top doc with green check -->
    <rect x="-15" y="-6" width="32" height="22" rx="1.5" fill="#FFFFFF" stroke="#7A3F22" stroke-width="1.4"/>
    <!-- Lines on top doc -->
    <line x1="-11" y1="-1" x2="13" y2="-1" stroke="#9C8A6A" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-11" y1="2" x2="10" y2="2" stroke="#9C8A6A" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-11" y1="5" x2="13" y2="5" stroke="#9C8A6A" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Green check on top doc -->
    <circle cx="9" cy="11" r="3.5" fill="#1A8870"/>
    <path d="M7.5 11 L8.6 12.2 L11 9.8" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Legs -->
  <line x1="54" y1="116" x2="48" y2="138" stroke="#7A3F22" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="54" y1="116" x2="60" y2="138" stroke="#7A3F22" stroke-width="3.2" stroke-linecap="round"/>

</svg>
