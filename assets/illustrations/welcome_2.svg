<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <!-- Welcome Card 2 — Three villagers running the app together
       Left: villager pinning notices to a board (adding schemes).
       Center: villager holding phone (verifying residents).
       Right: villager with open ledger book (keeping records).
       Soft dashed arcs above connect them as a team.
       Palette: warm cream + soft green + terracotta accents,
       matching the 8 feature illustrations. -->

  <!-- Soft warm ground shadow line under all 3 -->
  <ellipse cx="140" cy="148" rx="125" ry="4" fill="#000" opacity="0.08"/>

  <!-- Dashed green connector arcs (the team) -->
  <g stroke="#9BC18A" stroke-width="1.2" fill="none" stroke-dasharray="2.5,3.5" opacity="0.7">
    <path d="M 70,55 Q 105,38 140,55"/>
    <path d="M 140,55 Q 175,38 210,55"/>
  </g>

  <!-- ═════ LEFT: Notice board + villager pinning ═════ -->
  <g>
    <!-- Notice board (wooden frame) -->
    <rect x="14" y="22" width="50" height="44" fill="#D7BC8C" rx="2"/>
    <rect x="14" y="22" width="50" height="44" fill="none" stroke="#7A5230" stroke-width="1.4" rx="2"/>
    <!-- Two small wooden posts at bottom of board -->
    <rect x="22" y="66" width="3" height="22" fill="#7A5230"/>
    <rect x="53" y="66" width="3" height="22" fill="#7A5230"/>
    <!-- Papers pinned to the board -->
    <rect x="19" y="27" width="13" height="10" fill="#FCE9D4" rx="0.5"/>
    <rect x="35" y="27" width="11" height="10" fill="#FCE9D4" rx="0.5"/>
    <rect x="49" y="27" width="11" height="10" fill="#FCE9D4" rx="0.5"/>
    <rect x="19" y="42" width="18" height="9" fill="#FCE9D4" rx="0.5"/>
    <rect x="40" y="42" width="20" height="9" fill="#FCE9D4" rx="0.5"/>
    <rect x="19" y="55" width="14" height="8" fill="#FCE9D4" rx="0.5"/>
    <rect x="36" y="55" width="24" height="8" fill="#FCE9D4" rx="0.5"/>
    <!-- Pin dots -->
    <circle cx="25.5" cy="28" r="1.2" fill="#C2440A"/>
    <circle cx="40.5" cy="28" r="1.2" fill="#C2440A"/>
    <circle cx="54.5" cy="28" r="1.2" fill="#C2440A"/>
    <circle cx="28"   cy="43" r="1.2" fill="#C2440A"/>
    <circle cx="50"   cy="43" r="1.2" fill="#C2440A"/>
    <!-- Faint text lines on papers -->
    <line x1="21" y1="32"  x2="30" y2="32"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="21" y1="35"  x2="28" y2="35"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="37" y1="32"  x2="44" y2="32"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="37" y1="35"  x2="43" y2="35"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="51" y1="32"  x2="58" y2="32"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="51" y1="35"  x2="57" y2="35"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="21" y1="46"  x2="35" y2="46"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="42" y1="46"  x2="58" y2="46"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="21" y1="59"  x2="31" y2="59"  stroke="#A0816A" stroke-width="0.6"/>
    <line x1="38" y1="59"  x2="58" y2="59"  stroke="#A0816A" stroke-width="0.6"/>

    <!-- Villager (left of the board, reaching to pin a paper) -->
    <!-- Legs -->
    <rect x="56" y="115" width="6" height="28" fill="#3F5470" rx="1.5"/>
    <rect x="64" y="115" width="6" height="28" fill="#3F5470" rx="1.5"/>
    <!-- Torso -->
    <rect x="54" y="92" width="18" height="26" fill="#C2440A" rx="3"/>
    <!-- Head -->
    <circle cx="63" cy="82" r="9" fill="#E6B79E"/>
    <!-- Hair -->
    <path d="M 55,79 Q 63,71 71,79 Q 69,74 63,73 Q 57,74 55,79 Z" fill="#3A2A1A"/>
    <!-- Arm reaching toward the board (pinning) -->
    <path d="M 53,98 Q 38,82 48,72" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>
    <!-- Tiny pin/paper in raised hand -->
    <rect x="44" y="68" width="6" height="6" fill="#FCE9D4" stroke="#C2440A" stroke-width="0.6"/>
    <!-- Other arm down at side -->
    <path d="M 73,98 Q 78,110 75,118" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="59" cy="146" rx="4" ry="2" fill="#3A2A1A"/>
    <ellipse cx="67" cy="146" rx="4" ry="2" fill="#3A2A1A"/>
    <!-- Face dots -->
    <circle cx="60" cy="81" r="0.7" fill="#3A2A1A"/>
    <circle cx="66" cy="81" r="0.7" fill="#3A2A1A"/>
    <path d="M 60,86 Q 63,88 66,86" stroke="#3A2A1A" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ═════ CENTER: Villager holding phone ═════ -->
  <g>
    <!-- Legs -->
    <rect x="131" y="115" width="6" height="28" fill="#4A6B3F" rx="1.5"/>
    <rect x="139" y="115" width="6" height="28" fill="#4A6B3F" rx="1.5"/>
    <!-- Torso (saree/long shirt with terracotta border) -->
    <rect x="128" y="90" width="20" height="28" fill="#D9A55D" rx="3"/>
    <rect x="128" y="113" width="20" height="5" fill="#C2440A" rx="1.5"/>
    <!-- Head -->
    <circle cx="138" cy="80" r="9" fill="#D6A07A"/>
    <!-- Hair (long, gathered) -->
    <path d="M 129,77 Q 138,68 147,77 L 147,82 Q 138,76 129,82 Z" fill="#3A2A1A"/>
    <!-- Phone in hands -->
    <rect x="131" y="96" width="14" height="20" fill="#1A1A1A" rx="2"/>
    <rect x="133" y="98" width="10" height="16" fill="#3F5470" rx="1"/>
    <!-- Phone screen content (verification UI) -->
    <rect x="134" y="100" width="8" height="2.5" fill="#F5B940" rx="0.5"/>
    <circle cx="135" cy="106" r="1" fill="#9BC18A"/>
    <line x1="137" y1="106" x2="142" y2="106" stroke="#FFFFFF" stroke-width="0.6" opacity="0.7"/>
    <circle cx="135" cy="109" r="1" fill="#9BC18A"/>
    <line x1="137" y1="109" x2="141" y2="109" stroke="#FFFFFF" stroke-width="0.6" opacity="0.7"/>
    <circle cx="135" cy="112" r="1" fill="#9BC18A"/>
    <line x1="137" y1="112" x2="142" y2="112" stroke="#FFFFFF" stroke-width="0.6" opacity="0.7"/>
    <!-- Hands holding phone (small arm stubs) -->
    <ellipse cx="130" cy="103" rx="3" ry="4" fill="#D6A07A"/>
    <ellipse cx="146" cy="103" rx="3" ry="4" fill="#D6A07A"/>
    <!-- Feet -->
    <ellipse cx="134" cy="146" rx="4" ry="2" fill="#3A2A1A"/>
    <ellipse cx="142" cy="146" rx="4" ry="2" fill="#3A2A1A"/>
    <!-- Face dots -->
    <circle cx="135" cy="79" r="0.7" fill="#3A2A1A"/>
    <circle cx="141" cy="79" r="0.7" fill="#3A2A1A"/>
    <path d="M 135,84 Q 138,86 141,84" stroke="#3A2A1A" stroke-width="0.7" fill="none" stroke-linecap="round"/>
    <!-- Bindi -->
    <circle cx="138" cy="74" r="0.9" fill="#C2440A"/>
  </g>

  <!-- ═════ RIGHT: Villager with open ledger book ═════ -->
  <g>
    <!-- Legs -->
    <rect x="206" y="115" width="6" height="28" fill="#7A5230" rx="1.5"/>
    <rect x="214" y="115" width="6" height="28" fill="#7A5230" rx="1.5"/>
    <!-- Torso -->
    <rect x="204" y="92" width="18" height="26" fill="#9BC18A" rx="3"/>
    <!-- Head -->
    <circle cx="213" cy="82" r="9" fill="#E6B79E"/>
    <!-- Hair (short) -->
    <path d="M 205,79 Q 213,70 221,79 Q 219,74 213,73 Q 207,74 205,79 Z" fill="#3A2A1A"/>
    <!-- Open ledger book held in front, tilted slightly -->
    <g transform="rotate(-10 213 105)">
      <rect x="195" y="98" width="36" height="22" fill="#FCE9D4" rx="1"/>
      <rect x="195" y="98" width="36" height="22" fill="none" stroke="#7A5230" stroke-width="0.6"/>
      <line x1="213" y1="98" x2="213" y2="120" stroke="#7A5230" stroke-width="0.6"/>
      <line x1="198" y1="103" x2="210" y2="103" stroke="#A0816A" stroke-width="0.5"/>
      <line x1="198" y1="107" x2="210" y2="107" stroke="#A0816A" stroke-width="0.5"/>
      <line x1="198" y1="111" x2="210" y2="111" stroke="#A0816A" stroke-width="0.5"/>
      <line x1="198" y1="115" x2="208" y2="115" stroke="#A0816A" stroke-width="0.5"/>
      <line x1="216" y1="103" x2="228" y2="103" stroke="#A0816A" stroke-width="0.5"/>
      <line x1="216" y1="107" x2="228" y2="107" stroke="#A0816A" stroke-width="0.5"/>
      <line x1="216" y1="111" x2="228" y2="111" stroke="#A0816A" stroke-width="0.5"/>
      <line x1="216" y1="115" x2="226" y2="115" stroke="#A0816A" stroke-width="0.5"/>
      <!-- A few green checks scattered on the page (records) -->
      <path d="M 200,106 l 1.5,1.5 l 3,-3" stroke="#4A6B3F" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M 218,106 l 1.5,1.5 l 3,-3" stroke="#4A6B3F" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M 200,114 l 1.5,1.5 l 3,-3" stroke="#4A6B3F" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Hands holding book (small stubs) -->
    <ellipse cx="201" cy="108" rx="3" ry="4" fill="#E6B79E"/>
    <ellipse cx="225" cy="108" rx="3" ry="4" fill="#E6B79E"/>
    <!-- Feet -->
    <ellipse cx="209" cy="146" rx="4" ry="2" fill="#3A2A1A"/>
    <ellipse cx="217" cy="146" rx="4" ry="2" fill="#3A2A1A"/>
    <!-- Face dots -->
    <circle cx="210" cy="81" r="0.7" fill="#3A2A1A"/>
    <circle cx="216" cy="81" r="0.7" fill="#3A2A1A"/>
    <path d="M 210,86 Q 213,88 216,86" stroke="#3A2A1A" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Tiny ground hint (faint horizontal line below shadow) -->
  <line x1="14" y1="158" x2="266" y2="158" stroke="#D7BC8C" stroke-width="0.5" opacity="0.6"/>
</svg>
