<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="A volunteer holds up a scheme paper reading Vriddha Pension Yojana, surrounded by a farmer, student, woman and elder.">

