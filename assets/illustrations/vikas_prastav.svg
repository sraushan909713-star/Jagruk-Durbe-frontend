<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="An empty Samudayik Bhawan with a villager imagining it transformed into a library, shown in a thought bubble.">

  <!-- Ground shadow -->
  <ellipse cx="140" cy="156" rx="116" ry="9" fill="#5A4632" opacity="0.10"/>

  <!-- Sun top-right (8 rays) -->
  <circle cx="240" cy="38" r="11" fill="#F5C36B"/>
  <line x1="240" y1="22" x2="240" y2="17" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="250" y1="27" x2="255" y2="22" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="255" y1="38" x2="261" y2="38" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="250" y1="49" x2="255" y2="54" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="240" y1="54" x2="240" y2="60" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="230" y1="49" x2="225" y2="54" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="225" y1="38" x2="219" y2="38" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="230" y1="27" x2="225" y2="22" stroke="#E6A53D" stroke-width="1.7" stroke-linecap="round"/>

  <!-- ── Empty Samudayik Bhawan (left) ─────────────────────────────────── -->
  <!-- Roof -->
  <polygon points="36,76 102,76 88,58 50,58" fill="#9C8A6A" stroke="#5C3920" stroke-width="1.6"/>
  <!-- Building body (grey-tan = unused feel) -->
  <rect x="42" y="76" width="54" height="64" fill="#B8AC93" stroke="#5C3920" stroke-width="1.6"/>

  <!-- Nameplate strip + Hindi label "सामुदायिक भवन" -->
  <rect x="44" y="82" width="50" height="10" fill="#9C8A6A" opacity="0.65"/>
  <text x="69" y="90" font-family="Noto Sans Devanagari, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#3D2817">सामुदायिक भवन</text>

  <!-- Window left -->
  <rect x="48" y="98" width="11" height="11" fill="#1F2937" stroke="#5C3920" stroke-width="1.2"/>
  <line x1="53.5" y1="98" x2="53.5" y2="109" stroke="#7A3F22" stroke-width="0.8"/>
  <line x1="48" y1="103.5" x2="59" y2="103.5" stroke="#7A3F22" stroke-width="0.8"/>
  <!-- Window right -->
  <rect x="79" y="98" width="11" height="11" fill="#1F2937" stroke="#5C3920" stroke-width="1.2"/>
  <line x1="84.5" y1="98" x2="84.5" y2="109" stroke="#7A3F22" stroke-width="0.8"/>
  <line x1="79" y1="103.5" x2="90" y2="103.5" stroke="#7A3F22" stroke-width="0.8"/>
  <!-- Door (closed) -->
  <rect x="62" y="116" width="14" height="24" fill="#3D2817" stroke="#5C3920" stroke-width="1.4"/>
  <!-- "X" pattern on door (faded, unused) -->
  <line x1="62" y1="116" x2="76" y2="140" stroke="#5C3920" stroke-width="0.8" opacity="0.5"/>
  <line x1="76" y1="116" x2="62" y2="140" stroke="#5C3920" stroke-width="0.8" opacity="0.5"/>

  <!-- ── Villager (centre, looking at the building, imagining) ──────────── -->
  <circle cx="128" cy="98" r="9" fill="#7A3F22"/>
  <path d="M119 98 Q128 89 137 98" fill="#5C3920" stroke="#7A3F22" stroke-width="1.1"/>
  <line x1="128" y1="107" x2="128" y2="128" stroke="#7A3F22" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms down at sides -->
  <path d="M128 112 L120 124" stroke="#7A3F22" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M128 112 L136 124" stroke="#7A3F22" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="128" y1="128" x2="123" y2="146" stroke="#7A3F22" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="133" y2="146" stroke="#7A3F22" stroke-width="3" stroke-linecap="round"/>

  <!-- ── Thought bubble dots from villager's head up to library ─────────── -->
  <circle cx="140" cy="88" r="1.8" fill="#FFFFFF" stroke="#7A3F22" stroke-width="0.7" opacity="0.85"/>
  <circle cx="148" cy="80" r="2.4" fill="#FFFFFF" stroke="#7A3F22" stroke-width="0.7" opacity="0.9"/>
  <circle cx="156" cy="71" r="3.2" fill="#FFFFFF" stroke="#7A3F22" stroke-width="0.7" opacity="0.95"/>

  <!-- ── Thought bubble (right) containing imagined library ─────────────── -->
  <ellipse cx="206" cy="86" rx="58" ry="42" fill="#FFFFFF" stroke="#7A3F22" stroke-width="1.6"/>

  <!-- Library building inside the thought bubble -->
  <!-- Roof (green to feel hopeful / different from grey bhawan) -->
  <polygon points="166,82 246,82 234,66 178,66" fill="#1A8870" stroke="#114F44" stroke-width="1.4"/>
  <!-- "पुस्तकालय" label on roof -->
  <text x="206" y="78" font-family="Noto Sans Devanagari, sans-serif" font-size="7.5" font-weight="bold" text-anchor="middle" fill="#FFFFFF">पुस्तकालय</text>
  <!-- Building body (warm cream — alive, occupied feel) -->
  <rect x="172" y="82" width="68" height="34" fill="#F0E2BE" stroke="#7A3F22" stroke-width="1.4"/>
  <!-- Window left -->
  <rect x="178" y="88" width="11" height="11" fill="#A8DDD2" stroke="#7A3F22" stroke-width="1"/>
  <line x1="183.5" y1="88" x2="183.5" y2="99" stroke="#7A3F22" stroke-width="0.7"/>
  <line x1="178" y1="93.5" x2="189" y2="93.5" stroke="#7A3F22" stroke-width="0.7"/>
  <!-- Big door (orange — welcoming, open feel) -->
  <rect x="207" y="92" width="16" height="24" fill="#C2440A" stroke="#7A3F22" stroke-width="1.2"/>
  <!-- Window right -->
  <rect x="226" y="88" width="11" height="11" fill="#A8DDD2" stroke="#7A3F22" stroke-width="1"/>
  <line x1="231.5" y1="88" x2="231.5" y2="99" stroke="#7A3F22" stroke-width="0.7"/>
  <line x1="226" y1="93.5" x2="237" y2="93.5" stroke="#7A3F22" stroke-width="0.7"/>

  <!-- Books stacked in front of library (showing it's now active) -->
  <rect x="174" y="104" width="5" height="12" fill="#C2440A" stroke="#7A3F22" stroke-width="0.8"/>
  <rect x="180" y="106" width="4" height="10" fill="#1A8870" stroke="#7A3F22" stroke-width="0.8"/>
  <rect x="185" y="104" width="5" height="12" fill="#1E3A8A" stroke="#7A3F22" stroke-width="0.8"/>
  <rect x="191" y="107" width="4" height="9" fill="#E6A53D" stroke="#7A3F22" stroke-width="0.8"/>

</svg>
