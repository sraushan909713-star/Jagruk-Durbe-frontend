<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="A villager stands fully visible to the left of a large report card with two columns: kya bana (what was built, green checks) and kya nahi bana (what was not built, red crosses).">

  <!-- Ground shadow -->
  <ellipse cx="140" cy="158" rx="116" ry="9" fill="#5A4632" opacity="0.10"/>

  <!-- ── Villager (LEFT, fully visible head to feet, standing) ──────────── -->
  <!-- Head -->
  <circle cx="48" cy="48" r="11" fill="#7A3F22"/>
  <!-- Hair cap -->
  <path d="M37 48 Q48 37 59 48" fill="#5C3920" stroke="#7A3F22" stroke-width="1.2"/>
  <!-- Torso -->
  <line x1="48" y1="59" x2="48" y2="102" stroke="#7A3F22" stroke-width="3.4" stroke-linecap="round"/>
  <!-- LEFT arm down at side -->
  <path d="M48 68 L40 88" stroke="#7A3F22" stroke-width="3" stroke-linecap="round"/>
  <!-- RIGHT arm raised pointing toward card -->
  <path d="M48 66 L82 56" stroke="#7A3F22" stroke-width="3" stroke-linecap="round"/>
  <!-- Pointing hand (small circle at tip) -->
  <circle cx="83" cy="56" r="2.5" fill="#7A3F22"/>
  <!-- Legs -->
  <line x1="48" y1="102" x2="40" y2="138" stroke="#7A3F22" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="48" y1="102" x2="56" y2="138" stroke="#7A3F22" stroke-width="3.4" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="39" cy="139" rx="4" ry="1.6" fill="#5C3920"/>
  <ellipse cx="57" cy="139" rx="4" ry="1.6" fill="#5C3920"/>

  <!-- ── Report Card (right of figure, full height) ────────────────────── -->
  <rect x="98" y="30" width="146" height="100" rx="3" fill="#FFFFFF" stroke="#7A3F22" stroke-width="1.8"/>
  <!-- Header strip with title -->
  <rect x="98" y="30" width="146" height="14" fill="#7A3F22"/>
  <text x="171" y="40" font-family="Noto Sans Devanagari, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#FCEFD2">रिपोर्ट कार्ड</text>

  <!-- Vertical divider -->
  <line x1="171" y1="44" x2="171" y2="130" stroke="#9C8A6A" stroke-width="1"/>

  <!-- Left column header: क्या बना (green) -->
  <rect x="98" y="44" width="73" height="14" fill="#DCEFE6"/>
  <text x="134.5" y="54" font-family="Noto Sans Devanagari, sans-serif" font-size="7" font-weight="bold" text-anchor="middle" fill="#1A8870">क्या बना</text>

  <!-- Right column header: क्या नहीं बना (red/pink) -->
  <rect x="171" y="44" width="73" height="14" fill="#FAE1DA"/>
  <text x="207.5" y="54" font-family="Noto Sans Devanagari, sans-serif" font-size="7" font-weight="bold" text-anchor="middle" fill="#C2440A">क्या नहीं बना</text>

  <!-- Left column: green-tick rows -->
  <g transform="translate(106 70)">
    <circle cx="0" cy="0" r="3.2" fill="#1A8870"/>
    <path d="M-1.6 0 L-0.3 1.3 L1.6 -1" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="6" y1="0" x2="55" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(106 84)">
    <circle cx="0" cy="0" r="3.2" fill="#1A8870"/>
    <path d="M-1.6 0 L-0.3 1.3 L1.6 -1" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="6" y1="0" x2="50" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(106 98)">
    <circle cx="0" cy="0" r="3.2" fill="#1A8870"/>
    <path d="M-1.6 0 L-0.3 1.3 L1.6 -1" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="6" y1="0" x2="58" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(106 112)">
    <circle cx="0" cy="0" r="3.2" fill="#1A8870"/>
    <path d="M-1.6 0 L-0.3 1.3 L1.6 -1" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="6" y1="0" x2="52" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Right column: red-cross rows -->
  <g transform="translate(179 70)">
    <circle cx="0" cy="0" r="3.2" fill="#C2440A"/>
    <line x1="-1.4" y1="-1.4" x2="1.4" y2="1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="-1.4" y1="1.4" x2="1.4" y2="-1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="6" y1="0" x2="56" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(179 84)">
    <circle cx="0" cy="0" r="3.2" fill="#C2440A"/>
    <line x1="-1.4" y1="-1.4" x2="1.4" y2="1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="-1.4" y1="1.4" x2="1.4" y2="-1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="6" y1="0" x2="52" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(179 98)">
    <circle cx="0" cy="0" r="3.2" fill="#C2440A"/>
    <line x1="-1.4" y1="-1.4" x2="1.4" y2="1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="-1.4" y1="1.4" x2="1.4" y2="-1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="6" y1="0" x2="58" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(179 112)">
    <circle cx="0" cy="0" r="3.2" fill="#C2440A"/>
    <line x1="-1.4" y1="-1.4" x2="1.4" y2="1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="-1.4" y1="1.4" x2="1.4" y2="-1.4" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="6" y1="0" x2="54" y2="0" stroke="#9C8A6A" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- ── Sun (small, top-right corner) ──────────────────────────────────── -->
  <circle cx="258" cy="20" r="9" fill="#F5C36B"/>
  <line x1="258" y1="8" x2="258" y2="4" stroke="#E6A53D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="266" y1="12" x2="270" y2="8" stroke="#E6A53D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="270" y1="20" x2="274" y2="20" stroke="#E6A53D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="266" y1="28" x2="270" y2="32" stroke="#E6A53D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="250" y1="28" x2="246" y2="32" stroke="#E6A53D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="246" y1="20" x2="242" y2="20" stroke="#E6A53D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="250" y1="12" x2="246" y2="8" stroke="#E6A53D" stroke-width="1.5" stroke-linecap="round"/>

</svg>
